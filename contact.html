<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png">
<title>TLW MR PASI PROFILE PAGE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  text-align:center;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:url('bg_logo.png') no-repeat center center/cover fixed;
  position:relative;
}

body::after{
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  z-index:-1;
}

/* LOGO & TITLE */
.logo-title{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:30px;
}

.logo-title img{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-bottom:15px;
}

.title{
  font-size:32px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:2px;
  background: linear-gradient(90deg,#ff0000,#ff7300,#FFD700);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 10px red,0 0 20px red;
  animation:glow 2s infinite alternate;
  margin-bottom:30px;
}

/* GLOW EFFECT */
@keyframes glow{
  from{ text-shadow:0 0 10px red,0 0 20px red;}
  to{ text-shadow:0 0 20px #ff0000,0 0 40px #ff0000;}
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.card{
  width:130px;
  padding:20px;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px); /* 🔥 Glass effect */
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.card img{
  width:60px;
  height:60px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:5px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 20px red,0 0 40px red;
}

.card:hover img{
  transform:scale(1.1);
}

.card p{
  margin-top:5px;
  font-weight:600;
  color:#FFD700;
  font-size:14px;
}

/* MOBILE */
@media(max-width:480px){
  .title{font-size:24px;}
  .card{width:110px;padding:15px;}
  .card img{width:50px;height:50px;}
}
</style>
</head>

<body>

<!-- LOGO & TITLE -->
<div class="logo-title">
  <img src="Logo.png" alt="Logo">
  <div class="title">TLW MR PASI DIAMOND STORE</div>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card" onclick="openWhatsApp()">
    <img src="whatsapp.png" alt="WhatsApp">
    <p>WhatsApp</p>
  </div>
  <div class="card" onclick="openTelegram()">
    <img src="telegram.png" alt="Telegram">
    <p>Telegram</p>
  </div>
  <div class="card" onclick="openTiktok()">
    <img src="tiktok.png" alt="TikTok">
    <p>TikTok</p>
  </div>
  <div class="card" onclick="openFacebook()">
    <img src="facebook.png" alt="Facebook">
    <p>Facebook</p>
  </div>
</div>

<script>
function openWhatsApp(){
  window.open("https://wa.me/94755582915");
}
function openTelegram(){
  window.open("https://t.me/Mrpasigaming");
}
function openTiktok(){
  window.open("https://www.tiktok.com/@mr_pasi_gaming");
}
function openFacebook(){
  window.open("https://www.facebook.com/mauri.senarathna");
}
</script>

</body>
</html>
