<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png">
<title>TLW MR PASI DIAMOND STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0; padding:0;
  color:white;
  text-align:center;
  min-height:100vh;
  background: url('OIP.webp') center center / cover no-repeat fixed;
  position: relative;
}
body::after{
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.75);
  z-index:-1;
}

.overlay{
  background: rgba(25,25,25,0.85);
  padding:30px;
  border-radius:15px;
  max-width:500px;
  margin:50px auto;
  box-shadow:0 8px 20px rgba(0,0,0,0.7);
  position: relative;
  z-index:1;
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  0%{opacity:0; transform:translateY(-20px);}
  100%{opacity:1; transform:translateY(0);}
}

/* LOGO */
#logo{
  width:80px;
  height:80px;
  margin:0 auto 15px;
  animation:logoBounce 2s infinite;
}
@keyframes logoBounce{
  0%, 100%{transform: translateY(0);}
  50%{transform: translateY(-10px);}
}

/* TITLE ANIMATION */
.title{
  font-family:'Orbitron', sans-serif;
  font-size:26px;
  font-weight:700;
  margin-bottom:15px;
  color:#FFD700;
  text-shadow:0 0 5px #FF0000, 0 0 10px #FF4500, 0 0 20px #FFD700;
  animation:glow 1.5s ease-in-out infinite alternate;
}
@keyframes glow{
  0%{text-shadow:0 0 5px #FF0000, 0 0 10px #FF4500, 0 0 20px #FFD700;}
  50%{text-shadow:0 0 10px #FF0000, 0 0 20px #FF6347, 0 0 25px #FFD700;}
  100%{text-shadow:0 0 5px #FF0000, 0 0 10px #FF4500, 0 0 20px #FFD700;}
}

/* INPUTS & SELECTS */
input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
  background:#1f2937;
  color:#f0f0f0;
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
  transition:0.3s;
}
input:focus, select:focus{
  outline:none;
  box-shadow:0 0 8px #FF4500;
}

/* SUBMIT BUTTON */
button{
  font-family:'Orbitron', sans-serif;
  background:#FF0000;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  padding:12px;
  border-radius:8px;
  transition: 0.3s;
  text-shadow: 1px 1px 3px #000;
}
button:hover{
  background:#FF4500;
  box-shadow:0 0 12px #FFD700;
}

/* PAYMENT CARDS */
#paymentDetails{
  margin-top:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}
.card{
  background: linear-gradient(135deg, #111827, #1f2937);
  padding:15px 20px;
  border-radius:12px;
  text-align:left;
  display:flex;
  align-items:center;
  gap:15px;
  box-shadow:0 6px 12px rgba(0,0,0,0.5);
  transition: transform 0.25s, box-shadow 0.25s;
}
.card:hover{
  transform: translateY(-5px);
  box-shadow:0 12px 24px rgba(255,0,0,0.6);
}
.card img{
  width:50px;
  height:50px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:5px;
}
.card-content h4{
  margin:0 0 5px 0;
  font-size:16px;
  color:#FFD700;
  font-weight:600;
}
.card-content p{
  margin:2px 0;
  font-size:14px;
  color:#f0f0f0;
}

.total{
  margin-top:12px;
  font-size:20px;
  font-weight:bold;
  color:#FFD700;
}

.serviceCharge{
  margin-top:5px;
  font-size:14px;
  color:#FF4500;
  font-weight:bold;
}

@media(max-width:480px){
  .overlay{
    padding:20px;
    margin:30px 10px;
  }
  .card{
    flex-direction: column;
    align-items: flex-start;
  }
  .card img{
    width:50px;
    height:50px;
    margin-bottom:5px;
  }
}
</style>
</head>
<body>

<div class="overlay">
<img src="Logo.png" id="logo" alt="Logo">
<div class="title">TLW MR PASI DIAMOND STORE</div>

<input type="text" id="player" placeholder="Player ID (8-14)">
<input type="text" id="phone" placeholder="Whatsapp Number (10)">
<select id="pack">
  <option value="25|80">25 💎 - Rs.80</option>
  <option value="100|290">100 💎 - Rs.290</option>
  <option value="310|880">310 💎 - Rs.880</option>
  <option value="520|1450">520 💎 - Rs.1450</option>
  <option value="1060|2880">1060 💎 - Rs.2880</option>
  <option value="2180|5920">2180 💎 - Rs.5920</option>
  <option value="5600|14660">5600 💎 - Rs.14660</option>
  <option value="11500|30200">11500 💎 - Rs.30200</option>
  <option value="Weekly-Lite|140">Weekly-Lite - Rs.140</option>
  <option value="Weekly|520">Weekly - Rs.520</option>
  <option value="Monthly|2250">Monthly - Rs.2250</option>
  <option value="Evo Access 3D|190">Evo Access 3D - Rs.190</option>
  <option value="Evo Access 7D|280">Evo Access 7D - Rs.280</option>
  <option value="Evo Access 30D|780">Evo Access 30D - Rs.780</option>
</select>

<input type="number" id="qty" value="1" min="1">
<select id="payment">
<option value="ez">eZ Cash</option>
<option value="b1">People's Bank</option>
<option value="b2">NSB Bank</option>
<option value="b3">BOC Bank</option>
</select>

<div id="paymentDetails"></div>
<div class="serviceCharge" id="serviceChargeMsg"></div>

<input type="text" id="ref" placeholder="Payment Reference Number (max 16)">
<div class="total">Total: Rs.<span id="total">0</span></div>
<button onclick="send()">Send Order</button>
</div>

<script>
function calc(){
  let packVal = document.getElementById("pack").value;
  let price = parseInt(packVal.split('|')[1]);
  let qty = parseInt(document.getElementById("qty").value);
  const payment = document.getElementById("payment").value;
  let totalPrice = price * qty;
  let serviceMsg='';
  if(payment==="ez"){
    totalPrice += 20;
    serviceMsg='+ Rs.20 eZ Cash service charge included';
  }
  document.getElementById("total").innerText = totalPrice;
  document.getElementById("serviceChargeMsg").innerText = serviceMsg;
}

function pay(){
  const val = document.getElementById("payment").value;
  const box = document.getElementById("paymentDetails");
  box.innerHTML='';
  let cards = [];
  if(val=="b1") cards.push({name:"People's Bank", branch:"Ampara", account:"189200120107481", logo:"peoples_bank.png"});
  else if(val=="b2") cards.push({name:"NSB Bank", branch:"Ampara", account:"300081493034", logo:"nsb_bank.png"});
  else if(val=="b3") cards.push({name:"BOC Bank", branch:"Ampara", account:"XXXXXXXXXX", logo:"boc_bank.png"});
  else cards.push({name:"eZ Cash", branch:"Mobile Wallet", account:"0762253318", logo:"ez_cash.png"});
  cards.forEach(c=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <img src="${c.logo}" alt="${c.name} Logo">
      <div class="card-content">
        <h4>${c.name}</h4>
        <p>Branch: ${c.branch}</p>
        <p>Account/Number: ${c.account}</p>
      </div>`;
    box.appendChild(div);
  });
  calc();
}

document.getElementById("pack").addEventListener('change', calc);
document.getElementById("qty").addEventListener('input', calc);
document.getElementById("payment").addEventListener('change', pay);

function autoSelectPack(){
  const urlPack = new URLSearchParams(window.location.search).get("pack");
  if(urlPack){
    const options = document.querySelectorAll("#pack option");
    options.forEach(opt=>{
      if(opt.value.split('|')[0]===urlPack.split('|')[0]) opt.selected=true;
    });
  }
}
autoSelectPack();
calc();
pay();

function send(){
  let p=document.getElementById("player").value;
  let ph=document.getElementById("phone").value;
  let pack=document.getElementById("pack").value;
  let total=document.getElementById("total").innerText;
  let ref=document.getElementById("ref").value;
  let payment=document.getElementById("payment").value;
  if(!p || p.length<8 || p.length>14){alert("Player ID 8-14 characters"); return;}
  if(!ph || ph.length!=10){alert("Phone number 10 digits"); return;}
  if(!ref || ref.length>16){alert("Reference Number max 16"); return;}
  let payName = payment=="b1"?"People's Bank":payment=="b2"?"NSB Bank":payment=="b3"?"BOC Bank":"eZ Cash";
  let msg=`🔥 NEW ORDER 🔥
Player ID: ${p}
Phone: ${ph}
Pack: ${pack}
Total: Rs.${total}
Payment Method: ${payName}
Reference No: ${ref}
Please attach payment receipt screenshot`;
  window.open("https://wa.me/94755582915?text="+encodeURIComponent(msg));
  alert("✅ ORDERED DONE\n\nTHANKS FOR CONTACT ME");
}
</script>

</body>
</html>
